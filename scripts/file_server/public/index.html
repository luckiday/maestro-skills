<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Teaching Docs</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/lib/marked.umd.js"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/lib/codemirror.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/markdown/markdown.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/javascript/javascript.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/python/python.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/yaml/yaml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/xml/xml.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/css/css.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/codemirror@5.65.16/mode/shell/shell.js"></script>
</head>
<body>
  <div class="layout">
    <div class="sidebar-overlay" id="sidebar-overlay" hidden aria-hidden="true"></div>
    <button type="button" class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle file list" aria-expanded="false">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
        <path d="M3 6h18M3 12h18M3 18h18"/>
      </svg>
    </button>
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h1>Teaching Docs</h1>
      </div>
      <div class="sidebar-content">
        <ul class="tree" id="file-tree" aria-label="File list"></ul>
        <div class="tree-divider" id="tree-divider" hidden></div>
        <ul class="tree" id="extra-tree" aria-label="Extra folders"></ul>
        <div id="tree-loading" class="loading" aria-live="polite">Loading…</div>
        <div id="tree-error" class="error-state" role="alert" hidden></div>
      </div>
    </aside>

    <main class="main">
      <header class="main-header" id="main-header" hidden>
        <h2 id="viewer-title"></h2>
        <div class="header-actions">
          <div class="header-actions-view" id="header-actions-view">
            <button type="button" id="edit-btn" class="edit-btn" aria-label="Edit file" title="Edit">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
                <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/>
                <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/>
              </svg>
            </button>
          </div>
          <div class="header-actions-edit" id="header-actions-edit" hidden>
            <button type="button" id="save-btn" class="save-btn" title="Save (Ctrl+S)">Save</button>
            <button type="button" id="cancel-btn" class="cancel-btn" title="Cancel">Cancel</button>
          </div>
          <button type="button" id="export-pdf-btn" class="export-btn" aria-label="Export to PDF" title="Export to PDF">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
              <polyline points="14 2 14 8 20 8"/>
              <line x1="12" y1="18" x2="12" y2="12"/>
              <line x1="9" y1="15" x2="12" y2="12"/>
              <line x1="15" y1="15" x2="12" y2="12"/>
            </svg>
            <span>PDF</span>
          </button>
          <button type="button" id="delete-btn" class="delete-btn" aria-label="Delete file" title="Delete">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
              <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
          </button>
        </div>
      </header>
      <div class="main-content">
        <section id="viewer" class="viewer" aria-label="File content" hidden>
          <div id="viewer-body"></div>
        </section>
        <section id="editor" class="editor" aria-label="File editor" hidden>
          <div class="editor-pane" id="editor-pane">
            <div class="editor-source" id="editor-source">
              <textarea id="editor-area"></textarea>
            </div>
            <div class="editor-preview" id="editor-preview" hidden aria-label="Markdown preview">
              <div class="editor-preview-content content markdown" id="editor-preview-content"></div>
            </div>
          </div>
        </section>
      </div>
    </main>
  </div>

  <template id="folder-icon">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M20 20a2 2 0 0 0 2-2V8l-3 3V8a2 2 0 0 0-2-2h-6l-2-2H4a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2Z"/>
    </svg>
  </template>
  <template id="file-icon">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
    </svg>
  </template>
  <template id="pdf-icon">
    <svg class="icon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M14 2v4a2 2 0 0 0 2 2h4"/>
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/>
      <path d="M14 12h2"/>
      <path d="M14 16h2"/>
      <path d="M10 12h2"/>
    </svg>
  </template>

  <script>
    const treeEl = document.getElementById('file-tree');
    const extraTreeEl = document.getElementById('extra-tree');
    const treeDivider = document.getElementById('tree-divider');
    const treeLoading = document.getElementById('tree-loading');
    const treeError = document.getElementById('tree-error');
    const viewer = document.getElementById('viewer');
    const editor = document.getElementById('editor');
    const mainHeader = document.getElementById('main-header');
    const viewerTitle = document.getElementById('viewer-title');
    const viewerBody = document.getElementById('viewer-body');
    const editorArea = document.getElementById('editor-area');
    const editBtn = document.getElementById('edit-btn');
    const saveBtn = document.getElementById('save-btn');
    const cancelBtn = document.getElementById('cancel-btn');
    const deleteBtn = document.getElementById('delete-btn');
    const exportPdfBtn = document.getElementById('export-pdf-btn');
    const headerActionsView = document.getElementById('header-actions-view');
    const headerActionsEdit = document.getElementById('header-actions-edit');

    let activePath = null;
    let activeRoot = null;
    let activeName = null;
    let editorInstance = null;
    let originalContent = null;

    function cloneIcon(id) {
      return document.getElementById(id).content.cloneNode(true);
    }

    function getModeForFile(filename) {
      const ext = filename.split('.').pop().toLowerCase();
      const modes = {
        'md': 'markdown',
        'js': 'javascript',
        'ts': 'javascript',
        'json': 'javascript',
        'py': 'python',
        'yaml': 'yaml',
        'yml': 'yaml',
        'xml': 'xml',
        'html': 'xml',
        'css': 'css',
        'sh': 'shell',
        'bash': 'shell',
      };
      return modes[ext] || 'text';
    }

    function renderTree(node, depth, rootLabel = null) {
      if (node.type === 'file') {
        const li = document.createElement('li');
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'node file';
        btn.dataset.path = node.path;
        if (rootLabel) {
          btn.dataset.root = rootLabel;
        }
        const isPdf = /\.pdf$/i.test(node.name);
        btn.appendChild(cloneIcon(isPdf ? 'pdf-icon' : 'file-icon'));
        btn.appendChild(document.createTextNode(node.name));
        btn.setAttribute('aria-label', 'Open file ' + node.name);
        btn.addEventListener('click', () => openFile(node.path, node.name, rootLabel));
        li.appendChild(btn);
        return li;
      }
      const li = document.createElement('li');
      const childrenUl = document.createElement('ul');
      childrenUl.className = 'children';
      const toggle = document.createElement('button');
      toggle.type = 'button';
      toggle.className = 'node folder';
      toggle.appendChild(cloneIcon('folder-icon'));
      toggle.appendChild(document.createTextNode(node.name));
      toggle.setAttribute('aria-expanded', 'false');
      toggle.setAttribute('aria-label', 'Folder ' + node.name);
      toggle.addEventListener('click', () => {
        const open = childrenUl.hidden;
        childrenUl.hidden = !open;
        toggle.setAttribute('aria-expanded', String(!open));
      });
      li.appendChild(toggle);
      if (node.children && node.children.length) {
        node.children.forEach(child => {
          childrenUl.appendChild(renderTree(child, depth + 1, rootLabel));
        });
        childrenUl.hidden = true;
        li.appendChild(childrenUl);
      }
      return li;
    }

    function setActive(path, root) {
      activePath = path;
      activeRoot = root;
      treeEl.querySelectorAll('.node.file').forEach(n => {
        n.classList.toggle('active', n.dataset.path === path && !n.dataset.root);
      });
      extraTreeEl.querySelectorAll('.node.file').forEach(n => {
        n.classList.toggle('active', n.dataset.path === path && n.dataset.root === root);
      });
    }

    async function loadTree() {
      treeLoading.hidden = false;
      treeError.hidden = true;
      treeEl.innerHTML = '';
      extraTreeEl.innerHTML = '';
      treeDivider.hidden = true;
      
      try {
        // Load workspace tree
        const r = await fetch('/api/files', { credentials: 'include' });
        if (r.status === 401) {
          window.location.reload();
          return;
        }
        if (!r.ok) throw new Error('Failed to load file list');
        const root = await r.json();
        if (root.children && root.children.length) {
          root.children.forEach(child => {
            treeEl.appendChild(renderTree(child, 0));
          });
        }
        
        // Load extra roots
        const r2 = await fetch('/api/roots', { credentials: 'include' });
        if (r2.ok) {
          const data = await r2.json();
          const extras = data.roots.filter(r => r.type === 'extra');
          if (extras.length > 0) {
            treeDivider.hidden = false;
            for (const extra of extras) {
              const r3 = await fetch('/api/extra/' + encodeURIComponent(extra.name), { credentials: 'include' });
              if (r3.ok) {
                const treeData = await r3.json();
                const li = document.createElement('li');
                const toggle = document.createElement('button');
                toggle.type = 'button';
                toggle.className = 'node folder root-folder';
                toggle.appendChild(cloneIcon('folder-icon'));
                toggle.appendChild(document.createTextNode(extra.name));
                toggle.setAttribute('aria-expanded', 'false');
                
                const childrenUl = document.createElement('ul');
                childrenUl.className = 'children';
                if (treeData.children && treeData.children.length) {
                  treeData.children.forEach(child => {
                    childrenUl.appendChild(renderTree(child, 0, extra.name));
                  });
                }
                toggle.addEventListener('click', () => {
                  const open = childrenUl.hidden;
                  childrenUl.hidden = !open;
                  toggle.setAttribute('aria-expanded', String(!open));
                });
                li.appendChild(toggle);
                childrenUl.hidden = true;
                li.appendChild(childrenUl);
                extraTreeEl.appendChild(li);
              }
            }
          }
        }
      } catch (e) {
        treeError.textContent = e.message || 'Error loading files';
        treeError.hidden = false;
      } finally {
        treeLoading.hidden = true;
      }
    }

    function fileUrl(filePath, root) {
      if (root) {
        const pathEnc = filePath.split('/').map(encodeURIComponent).join('/');
        return '/api/extra/' + encodeURIComponent(root) + '/' + pathEnc;
      }
      const pathEnc = filePath.split('/').map(encodeURIComponent).join('/');
      return '/api/files/' + pathEnc;
    }

    async function openFile(filePath, name, root = null) {
      setActive(filePath, root);
      activeName = name;
      viewer.hidden = false;
      editor.hidden = true;
      headerActionsView.hidden = false;
      headerActionsEdit.hidden = true;
      mainHeader.hidden = false;
      viewerTitle.textContent = name;
      viewerBody.innerHTML = '<span class="loading">Loading…</span>';
      editBtn.hidden = true;

      const isPdf = /\.pdf$/i.test(name);
      if (isPdf) {
        headerActionsView.hidden = true;
        viewerBody.innerHTML = '';
        viewerBody.classList.add('viewer-body-pdf');
        const iframe = document.createElement('iframe');
        iframe.className = 'viewer-pdf';
        iframe.src = fileUrl(filePath, root);
        iframe.title = name;
        viewerBody.appendChild(iframe);
        return;
      }

      viewerBody.classList.remove('viewer-body-pdf');
      const isMarkdown = /\.md$/i.test(name);
      const isEditable = /\.(md|txt|json|html|css|js|ts|yaml|yml|toml|sh)$/i.test(name);
      
      try {
        const r = await fetch(fileUrl(filePath, root), { credentials: 'include' });
        if (r.status === 401) {
          window.location.reload();
          return;
        }
        if (!r.ok) throw new Error('Failed to load file');
        const contentType = r.headers.get('Content-Type') || '';
        const text = await r.text();
        
        if (isEditable) {
          editBtn.hidden = false;
          headerActionsView.hidden = false;
          originalContent = text;
        } else {
          headerActionsView.hidden = true;
        }
        
        if (contentType.includes('markdown') || isMarkdown) {
          const html = typeof marked !== 'undefined'
            ? (marked.parse ? marked.parse(text, { gfm: true, breaks: true }) : marked(text))
            : simpleMarkdown(text);
          viewerBody.innerHTML = '<div class="content markdown">' + html + '</div>';
        } else {
          const pre = document.createElement('pre');
          pre.textContent = text;
          viewerBody.innerHTML = '';
          viewerBody.appendChild(pre);
        }
      } catch (e) {
        viewerBody.innerHTML = '<p class="error-state">' + (e.message || 'Error loading file') + '</p>';
      }
    }

    const editorPane = document.getElementById('editor-pane');
    const editorSource = document.getElementById('editor-source');
    const editorPreview = document.getElementById('editor-preview');
    const editorPreviewContent = document.getElementById('editor-preview-content');
    let previewDebounce = null;

    function renderMarkdownPreview(text) {
      if (typeof marked !== 'undefined') {
        return marked.parse ? marked.parse(text, { gfm: true, breaks: true }) : marked(text);
      }
      return simpleMarkdown(text);
    }

    function updateMarkdownPreview() {
      if (!editorInstance || !editorPreviewContent) return;
      const text = editorInstance.getValue();
      editorPreviewContent.innerHTML = renderMarkdownPreview(text);
    }

    function startEdit() {
      if (!originalContent) return;
      viewer.hidden = true;
      editor.hidden = false;
      headerActionsView.hidden = true;
      headerActionsEdit.hidden = false;

      const isMarkdown = /\.md$/i.test(activeName);
      editorPreview.hidden = !isMarkdown;
      editorPane.classList.toggle('editor-split', isMarkdown);

      if (editorInstance) {
        editorInstance.setOption('mode', getModeForFile(activeName));
        editorInstance.setValue(originalContent);
      } else {
        editorInstance = CodeMirror.fromTextArea(editorArea, {
          mode: getModeForFile(activeName),
          theme: 'default',
          lineNumbers: true,
          lineWrapping: true,
          autofocus: true,
        });
        editorInstance.setValue(originalContent);
        editorInstance.on('change', () => {
          if (!/\.md$/i.test(activeName)) return;
          clearTimeout(previewDebounce);
          previewDebounce = setTimeout(updateMarkdownPreview, 150);
        });
      }

      if (isMarkdown) {
        updateMarkdownPreview();
      }

      requestAnimationFrame(() => {
        if (editorInstance && editorInstance.refresh) editorInstance.refresh();
      });
    }

    async function saveEdit() {
      if (!editorInstance || !activePath) return;
      
      const content = editorInstance.getValue();
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';
      
      try {
        const url = fileUrl(activePath, activeRoot);
        const r = await fetch(url, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ content })
        });
        
        if (r.status === 401) {
          window.location.reload();
          return;
        }
        
        if (!r.ok) throw new Error('Failed to save');
        
        originalContent = content;
        editor.hidden = true;
        viewer.hidden = false;
        headerActionsView.hidden = false;
        headerActionsEdit.hidden = true;
        openFile(activePath, activeName, activeRoot);
      } catch (e) {
        alert('Save failed: ' + (e.message || 'Unknown error'));
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save';
      }
    }

    function cancelEdit() {
      editor.hidden = true;
      viewer.hidden = false;
      headerActionsView.hidden = false;
      headerActionsEdit.hidden = true;
    }

    function simpleMarkdown(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/^\*\*(.+?)\*\*$/gm, '<strong>$1</strong>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/s, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/\n/g, '<br/>');
    }

    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const sidebarOverlay = document.getElementById('sidebar-overlay');

    function toggleSidebar(open) {
      sidebar.classList.toggle('sidebar-open', open);
      document.querySelector('.layout').classList.toggle('sidebar-open', open);
      sidebarToggle.setAttribute('aria-expanded', String(!!open));
      sidebarOverlay.hidden = !open;
    }
    sidebarToggle.addEventListener('click', () => toggleSidebar(!sidebar.classList.contains('sidebar-open')));
    sidebarOverlay.addEventListener('click', () => toggleSidebar(false));

    // Event listeners
    editBtn.addEventListener('click', startEdit);
    saveBtn.addEventListener('click', saveEdit);
    cancelBtn.addEventListener('click', cancelEdit);

    // Keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      if ((e.ctrlKey || e.metaKey) && e.key === 's' && !editor.hidden) {
        e.preventDefault();
        saveEdit();
      }
      if (e.key === 'Escape' && !editor.hidden) {
        cancelEdit();
      }
    });

    // Delete file handler
    deleteBtn.addEventListener('click', async () => {
      if (!activePath) return;
      const name = activePath.split('/').pop();
      if (!confirm(`Delete "${name}"? This cannot be undone.`)) return;
      try {
        const url = fileUrl(activePath, activeRoot);
        const r = await fetch(url, {
          method: 'DELETE',
          credentials: 'include'
        });
        if (r.status === 401) {
          window.location.reload();
          return;
        }
        if (!r.ok) throw new Error('Failed to delete');
        viewer.hidden = true;
        editor.hidden = true;
        mainHeader.hidden = true;
        activePath = null;
        activeRoot = null;
        loadTree();
      } catch (e) {
        alert('Delete failed: ' + (e.message || 'Unknown error'));
      }
    });

    // Export to PDF handler
    exportPdfBtn.addEventListener('click', () => {
      if (!activePath) return;
      const ext = activePath.split('.').pop().toLowerCase();
      if (ext !== 'md' && ext !== 'txt' && ext !== 'markdown') {
        alert('Only markdown files can be exported to PDF');
        return;
      }
      const rootPrefix = activeRoot ? `/api/extra/${encodeURIComponent(activeRoot)}/` : '/api/';
      const exportUrl = rootPrefix + 'export/pdf/' + activePath.split('/').map(encodeURIComponent).join('/');
      window.open(exportUrl, '_blank');
    });

    loadTree();
  </script>
</body>
</html>
